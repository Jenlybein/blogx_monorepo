# ==============================================
# Fluent Bit 主配置文件：日志采集 + 发送到 ClickHouse
# ==============================================

# --------------------------
# 全局服务配置（核心启动参数）
# --------------------------
[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# --------------------------
# 输入源1：采集系统运行时日志
# --------------------------
[INPUT]
    Name              tail
    Path              /logs/runtime_logs/*/*.log
    Tag               runtime_logs
    Parser            json
    DB                /fluent-bit/state/runtime_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     20MB
    Read_from_Head    On

# --------------------------
# 输入源2：采集用户登录事件日志
# --------------------------
[INPUT]
    Name              tail
    Path              /logs/login_event_logs/*/*.log
    Tag               login_event_logs
    Parser            json
    DB                /fluent-bit/state/login_event_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

# --------------------------
# 输入源3：采集操作审计日志
# --------------------------
[INPUT]
    Name              tail
    Path              /logs/action_audit_logs/*/*.log
    Tag               action_audit_logs
    Parser            json
    DB                /fluent-bit/state/action_audit_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

# --------------------------
# 输出1：运行时日志 → 发送到 ClickHouse
# --------------------------
[OUTPUT]
    Name          http
    Match         runtime_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20blogx_logs.runtime_logs%20FORMAT%20JSONEachRow
    Format        json_lines
    Json_Date_Key false
    HTTP_User     default
    HTTP_Passwd   myblogxAbc12345

# --------------------------
# 输出2：登录日志 → 发送到 ClickHouse
# --------------------------
[OUTPUT]
    Name          http
    Match         login_event_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20blogx_logs.login_event_logs%20FORMAT%20JSONEachRow
    Format        json_lines
    Json_Date_Key false
    HTTP_User     default
    HTTP_Passwd   myblogxAbc12345

# --------------------------
# 输出3：审计日志 → 发送到 ClickHouse
# --------------------------
[OUTPUT]
    Name          http
    Match         action_audit_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20blogx_logs.action_audit_logs%20FORMAT%20JSONEachRow
    Format        json_lines
    Json_Date_Key false
    HTTP_User     default
    HTTP_Passwd   myblogxAbc12345
