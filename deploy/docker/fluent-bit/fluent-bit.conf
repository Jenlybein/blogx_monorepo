# ==============================================
# Fluent Bit 主配置文件：日志采集 + 发送到 ClickHouse
# 说明：通过 Fluent Bit 自身的 ${VAR} 环境变量展开读取容器环境
# ==============================================

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /logs/runtime_logs/*/*.log
    Tag               runtime_logs
    Parser            json
    DB                /fluent-bit/state/runtime_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     20MB
    Read_from_Head    On

[INPUT]
    Name              tail
    Path              /logs/login_event_logs/*/*.log
    Tag               login_event_logs
    Parser            json
    DB                /fluent-bit/state/login_event_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

[INPUT]
    Name              tail
    Path              /logs/action_audit_logs/*/*.log
    Tag               action_audit_logs
    Parser            json
    DB                /fluent-bit/state/action_audit_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

[INPUT]
    Name              tail
    Path              /logs/cdc_event_logs/*/*.log
    Tag               cdc_event_logs
    Parser            json
    DB                /fluent-bit/state/cdc_event_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

[INPUT]
    Name              tail
    Path              /logs/replay_event_logs/*/*.log
    Tag               replay_event_logs
    Parser            json
    DB                /fluent-bit/state/replay_event_logs.db
    Refresh_Interval  5
    Skip_Long_Lines   On
    Mem_Buf_Limit     10MB
    Read_from_Head    On

[OUTPUT]
    Name          http
    Match         runtime_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20${BLOGX_CLICKHOUSE_DB}.runtime_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&input_format_allow_errors_num=1000&input_format_allow_errors_ratio=0.1&date_time_input_format=best_effort
    Format        json_lines
    Json_Date_Key false
    HTTP_User     ${BLOGX_CLICKHOUSE_USERNAME}
    HTTP_Passwd   ${BLOGX_CLICKHOUSE_PASSWORD}

[OUTPUT]
    Name          http
    Match         login_event_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20${BLOGX_CLICKHOUSE_DB}.login_event_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&input_format_allow_errors_num=1000&input_format_allow_errors_ratio=0.1&date_time_input_format=best_effort
    Format        json_lines
    Json_Date_Key false
    HTTP_User     ${BLOGX_CLICKHOUSE_USERNAME}
    HTTP_Passwd   ${BLOGX_CLICKHOUSE_PASSWORD}

[OUTPUT]
    Name          http
    Match         action_audit_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20${BLOGX_CLICKHOUSE_DB}.action_audit_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&input_format_allow_errors_num=1000&input_format_allow_errors_ratio=0.1&date_time_input_format=best_effort
    Format        json_lines
    Json_Date_Key false
    HTTP_User     ${BLOGX_CLICKHOUSE_USERNAME}
    HTTP_Passwd   ${BLOGX_CLICKHOUSE_PASSWORD}

[OUTPUT]
    Name          http
    Match         cdc_event_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20${BLOGX_CLICKHOUSE_DB}.cdc_event_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&input_format_allow_errors_num=1000&input_format_allow_errors_ratio=0.1&date_time_input_format=best_effort
    Format        json_lines
    Json_Date_Key false
    HTTP_User     ${BLOGX_CLICKHOUSE_USERNAME}
    HTTP_Passwd   ${BLOGX_CLICKHOUSE_PASSWORD}

[OUTPUT]
    Name          http
    Match         replay_event_logs
    Host          clickhouse
    Port          8123
    URI           /?query=INSERT%20INTO%20${BLOGX_CLICKHOUSE_DB}.replay_event_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&input_format_allow_errors_num=1000&input_format_allow_errors_ratio=0.1&date_time_input_format=best_effort
    Format        json_lines
    Json_Date_Key false
    HTTP_User     ${BLOGX_CLICKHOUSE_USERNAME}
    HTTP_Passwd   ${BLOGX_CLICKHOUSE_PASSWORD}
