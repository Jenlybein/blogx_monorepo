services:
  mysql-master:
    image: "mysql:5.7"
    container_name: mysql-master
    restart: unless-stopped
    privileged: true
    environment:
      MYSQL_ROOT_PASSWORD: "${BLOGX_DB_PASSWORD}"
      TZ: "${TZ}"
      MYSQL_DATABASE: "${BLOGX_DB_NAME}"
      BLOGX_DB_USER: "${BLOGX_DB_USER}"
      BLOGX_DB_PASSWORD: "${BLOGX_DB_PASSWORD}"
      BLOGX_DB_REPL_USER: "${BLOGX_DB_REPL_USER}"
      BLOGX_DB_REPL_PASSWORD: "${BLOGX_DB_REPL_PASSWORD}"
    command:
    ports:
      - "${BLOGX_DB_MASTER_PORT}:3306"
    volumes:
      - ../../docker/mysql/master/my.cnf:/etc/mysql/my.cnf
      - ../../state/mysql/master/mysql-files:/var/lib/mysql-files
      - ../../state/mysql/master/data:/var/lib/mysql
      - ../../state/mysql/master/log:/var/log/
      - ../../docker/mysql/master/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - blogx_network

  mysql-slave:
    image: "mysql:5.7"
    container_name: mysql-slave
    restart: unless-stopped
    privileged: true
    environment:
      MYSQL_ROOT_PASSWORD: "${BLOGX_DB_PASSWORD}"
      TZ: "${TZ}"
      BLOGX_DB_NAME: "${BLOGX_DB_NAME}"
      BLOGX_DB_REPL_USER: "${BLOGX_DB_REPL_USER}"
      BLOGX_DB_REPL_PASSWORD: "${BLOGX_DB_REPL_PASSWORD}"
    command:
    ports:
      - "${BLOGX_DB_REPLICA_PORT}:3306"
    volumes:
      - ../../docker/mysql/slave/my.cnf:/etc/mysql/my.cnf
      - ../../state/mysql/slave/mysql-files:/var/lib/mysql-files
      - ../../state/mysql/slave/data:/var/lib/mysql
      - ../../state/mysql/slave/log:/var/log/
      - ../../docker/mysql/slave/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - blogx_network

  es:
    build:
      context: ../../..
      dockerfile: deploy/docker/es/Dockerfile
    image: "myblogx-elasticsearch:7.12.0"
    pull_policy: never
    container_name: es
    restart: unless-stopped
    privileged: true
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "true"
      xpack.security.transport.ssl.enabled: "true"
      http.cors.enabled: true
      http.cors.allow-origin: "*"
      http.cors.allow-headers: "X-Requested-With,Content-Type,Authorization"
      ELASTIC_PASSWORD: "${BLOGX_ES_PASSWORD}"
    ports:
      - "${BLOGX_ES_PORT}:9200"
    volumes:
      - ../../state/es/data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://127.0.0.1:9200/_cluster/health?wait_for_status=green&timeout=5s > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - blogx_network

  redis:
    image: "redis:7.4.7"
    container_name: redis
    restart: unless-stopped
    privileged: true
    environment:
      BLOGX_REDIS_PASSWORD: "${BLOGX_REDIS_PASSWORD}"
    command: ["/bin/sh", "/etc/redis/render-config.sh"]
    ports:
      - "${BLOGX_REDIS_PORT}:6379"
    volumes:
      - ../../state/redis/data:/data
      - ../../docker/redis/conf/redis.conf.tmpl:/etc/redis/redis.conf.tmpl:ro
      - ../../docker/redis/conf/render-config.sh:/etc/redis/render-config.sh:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${BLOGX_REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - blogx_network

