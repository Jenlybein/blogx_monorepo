  #     - CLUSTER_ID=kafka-single-prod-G86wewKeSvqCK-yU4sWNIA

  #     # ===== （可选）JVM 堆大小 =====
  #     - KAFKA_HEAP_OPTS=-Xms1g -Xmx1g

  #     # ===== SASL认证配置 =====
  #     - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN

  #     # 显式声明每个 listener 支持的机制（避免默认值导致不匹配）
  #     - KAFKA_LISTENER_NAME_EXTERNAL_SASL_ENABLED_MECHANISMS=PLAIN
  #     - KAFKA_LISTENER_NAME_CONTROLLER_SASL_ENABLED_MECHANISMS=PLAIN

  #     # 显式指定 controller 通信的 SASL 机制（因为 CONTROLLER listener 是 SASL_PLAINTEXT）
  #     - KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL=PLAIN

  #     # 注意：INTER_BROKER 用的是 INTERNAL（PLAINTEXT），所以不要配置 inter-broker SASL 机制
