  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: "${BLOGX_CLICKHOUSE_DB}" # 初始化创建的默认数据库（与日志库一致）
      CLICKHOUSE_PASSWORD: "${BLOGX_CLICKHOUSE_PASSWORD}" # 默认登录密码（与 Fluent Bit 配置一致）
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}" # 开启默认权限管理，允许远程连接和账号管理
    ports:
      # HTTP 接口端口（Fluent Bit 写入用）
      - 8123:8123
      # 原生 TCP 端口（客户端连接、程序直连用）
      - 9000:9000
    volumes:
      - ../../state/clickhouse/data:/var/lib/clickhouse
      - ../../state/clickhouse/logs:/var/log/clickhouse-server
      - ../../docker/clickhouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'clickhouse-client --user default --password "$${CLICKHOUSE_PASSWORD}" --query "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - blogx_network

  blogx_server:
    container_name: blogx-server
    image: "blogx-server:2"
    restart: unless-stopped
    build:
      context: ../../..
      dockerfile: deploy/docker/api/Dockerfile
    environment:
      TZ: "${TZ}"
      BLOGX_SERVER_ID: "${BLOGX_SERVER_ID}"
      BLOGX_APP_HOST: "${BLOGX_APP_HOST}"
      BLOGX_APP_PORT: "${BLOGX_APP_PORT}"
      BLOGX_APP_ENV: "${BLOGX_APP_ENV}"
      BLOGX_GIN_MODE: "${BLOGX_GIN_MODE}"
      BLOGX_LOG_APP: "${BLOGX_LOG_APP}"
      BLOGX_LOG_LEVEL: "${BLOGX_LOG_LEVEL}"
      BLOGX_LOG_REQUEST_LOG_ENABLED: "${BLOGX_LOG_REQUEST_LOG_ENABLED}"
      BLOGX_LOG_QUERY_DEFAULT_LIMIT: "${BLOGX_LOG_QUERY_DEFAULT_LIMIT}"
      BLOGX_LOG_QUERY_MAX_LIMIT: "${BLOGX_LOG_QUERY_MAX_LIMIT}"
      BLOGX_JWT_SECRET: "${BLOGX_JWT_SECRET}"
      BLOGX_JWT_ISSUER: "${BLOGX_JWT_ISSUER}"
      BLOGX_JWT_EXPIRE_HOURS: "${BLOGX_JWT_EXPIRE_HOURS}"
      BLOGX_JWT_REFRESH_EXPIRE_HOURS: "${BLOGX_JWT_REFRESH_EXPIRE_HOURS}"
      BLOGX_DB_NAME: "${BLOGX_DB_NAME}"
      BLOGX_DB_USER: "${BLOGX_DB_USER}"
      BLOGX_DB_PASSWORD: "${BLOGX_DB_PASSWORD}"
      BLOGX_DB_MASTER_HOST: "mysql-master"
      BLOGX_DB_MASTER_PORT: "3306"
      BLOGX_DB_REPLICA_HOST: "mysql-slave"
      BLOGX_DB_REPLICA_PORT: "3306"
      BLOGX_GORM_DEBUG: "${BLOGX_GORM_DEBUG}"
      BLOGX_GORM_MAX_IDLE_CONNS: "${BLOGX_GORM_MAX_IDLE_CONNS}"
      BLOGX_GORM_MAX_OPEN_CONNS: "${BLOGX_GORM_MAX_OPEN_CONNS}"
      BLOGX_GORM_CONN_MAX_LIFETIME_HOURS: "${BLOGX_GORM_CONN_MAX_LIFETIME_HOURS}"
      BLOGX_REDIS_HOST: "redis"
      BLOGX_REDIS_PORT: "6379"
      BLOGX_REDIS_USERNAME: "${BLOGX_REDIS_USERNAME}"
      BLOGX_REDIS_PASSWORD: "${BLOGX_REDIS_PASSWORD}"
      BLOGX_REDIS_DB: "${BLOGX_REDIS_DB}"
      BLOGX_KAFKA_BROKERS: "${BLOGX_KAFKA_BROKERS}"
      BLOGX_KAFKA_TOPIC: "${BLOGX_KAFKA_TOPIC}"
      BLOGX_KAFKA_GROUP_ID: "${BLOGX_KAFKA_GROUP_ID}"
      BLOGX_KAFKA_USERNAME: "${BLOGX_KAFKA_USERNAME}"
      BLOGX_KAFKA_PASSWORD: "${BLOGX_KAFKA_PASSWORD}"
      BLOGX_ES_URL: "http://es:9200"
      BLOGX_ES_ADDR: "es:9200"
      BLOGX_ES_INDEX: "${BLOGX_ES_INDEX}"
      BLOGX_ES_USERNAME: "${BLOGX_ES_USERNAME}"
      BLOGX_ES_PASSWORD: "${BLOGX_ES_PASSWORD}"
      BLOGX_ES_USE_HTTPS: "${BLOGX_ES_USE_HTTPS}"
      BLOGX_CLICKHOUSE_ADDR: "clickhouse:9000"
      BLOGX_CLICKHOUSE_DB: "${BLOGX_CLICKHOUSE_DB}"
      BLOGX_CLICKHOUSE_USERNAME: "${BLOGX_CLICKHOUSE_USERNAME}"
      BLOGX_CLICKHOUSE_PASSWORD: "${BLOGX_CLICKHOUSE_PASSWORD}"
      BLOGX_CLICKHOUSE_DIAL_TIMEOUT_SEC: "${BLOGX_CLICKHOUSE_DIAL_TIMEOUT_SEC}"
      BLOGX_CLICKHOUSE_MAX_OPEN_CONNS: "${BLOGX_CLICKHOUSE_MAX_OPEN_CONNS}"
      BLOGX_CLICKHOUSE_MAX_IDLE_CONNS: "${BLOGX_CLICKHOUSE_MAX_IDLE_CONNS}"
      BLOGX_RIVER_ENABLED: "${BLOGX_RIVER_ENABLED}"
      BLOGX_RIVER_SERVER_ID: "${BLOGX_RIVER_SERVER_ID}"
      BLOGX_RIVER_MYSQL_ADDR: "mysql-master:3306"
      BLOGX_RIVER_MYSQL_USER: "${BLOGX_RIVER_MYSQL_USER}"
      BLOGX_RIVER_MYSQL_PASSWORD: "${BLOGX_RIVER_MYSQL_PASSWORD}"
      BLOGX_RIVER_INDEX: "${BLOGX_RIVER_INDEX}"
      BLOGX_IMAGE_REF_RIVER_ENABLED: "${BLOGX_IMAGE_REF_RIVER_ENABLED}"
      BLOGX_IMAGE_REF_RIVER_SERVER_ID: "${BLOGX_IMAGE_REF_RIVER_SERVER_ID}"
      BLOGX_IMAGE_REF_RIVER_SCHEMA: "${BLOGX_IMAGE_REF_RIVER_SCHEMA}"
      BLOGX_IMAGE_REF_RIVER_MYSQL_ADDR: "mysql-master:3306"
      BLOGX_IMAGE_REF_RIVER_MYSQL_USER: "${BLOGX_IMAGE_REF_RIVER_MYSQL_USER}"
      BLOGX_IMAGE_REF_RIVER_MYSQL_PASSWORD: "${BLOGX_IMAGE_REF_RIVER_MYSQL_PASSWORD}"
      BLOGX_UPLOAD_SIZE_MB: "${BLOGX_UPLOAD_SIZE_MB}"
      BLOGX_UPLOAD_DIR: "${BLOGX_UPLOAD_DIR}"
      BLOGX_SMTP_HOST: "${BLOGX_SMTP_HOST}"
      BLOGX_SMTP_PORT: "${BLOGX_SMTP_PORT}"
      BLOGX_SMTP_USERNAME: "${BLOGX_SMTP_USERNAME}"
      BLOGX_SMTP_AUTH_CODE: "${BLOGX_SMTP_AUTH_CODE}"
      BLOGX_SMTP_FROM_NAME: "${BLOGX_SMTP_FROM_NAME}"
      BLOGX_SMTP_SSL: "${BLOGX_SMTP_SSL}"
      BLOGX_SMTP_TLS: "${BLOGX_SMTP_TLS}"
      BLOGX_QQ_APP_ID: "${BLOGX_QQ_APP_ID}"
      BLOGX_QQ_APP_KEY: "${BLOGX_QQ_APP_KEY}"
      BLOGX_QQ_REDIRECT: "${BLOGX_QQ_REDIRECT}"
      BLOGX_QINIU_ENABLED: "${BLOGX_QINIU_ENABLED}"
      BLOGX_QINIU_ACCESS_KEY: "${BLOGX_QINIU_ACCESS_KEY}"
      BLOGX_QINIU_SECRET_KEY: "${BLOGX_QINIU_SECRET_KEY}"
      BLOGX_QINIU_BUCKET: "${BLOGX_QINIU_BUCKET}"
      BLOGX_QINIU_DOMAIN: "${BLOGX_QINIU_DOMAIN}"
      BLOGX_QINIU_REGION: "${BLOGX_QINIU_REGION}"
      BLOGX_QINIU_PREFIX: "${BLOGX_QINIU_PREFIX}"
      BLOGX_QINIU_MAX_SIZE_MB: "${BLOGX_QINIU_MAX_SIZE_MB}"
      BLOGX_QINIU_TOKEN_EXPIRY_SEC: "${BLOGX_QINIU_TOKEN_EXPIRY_SEC}"
      BLOGX_QINIU_CALLBACK_URL: "${BLOGX_QINIU_CALLBACK_URL}"
      BLOGX_SITE_MODE: "${BLOGX_SITE_MODE}"
      BLOGX_LOGIN_QQ_ENABLED: "${BLOGX_LOGIN_QQ_ENABLED}"
      BLOGX_LOGIN_USERNAME_PASSWORD_ENABLED: "${BLOGX_LOGIN_USERNAME_PASSWORD_ENABLED}"
      BLOGX_LOGIN_EMAIL_ENABLED: "${BLOGX_LOGIN_EMAIL_ENABLED}"
      BLOGX_LOGIN_CAPTCHA_ENABLED: "${BLOGX_LOGIN_CAPTCHA_ENABLED}"
      BLOGX_EMAIL_CODE_TIMEOUT_MIN: "${BLOGX_EMAIL_CODE_TIMEOUT_MIN}"
      BLOGX_LOGIN_FAIL_WINDOW_MIN: "${BLOGX_LOGIN_FAIL_WINDOW_MIN}"
      BLOGX_LOGIN_FAIL_USER_MAX: "${BLOGX_LOGIN_FAIL_USER_MAX}"
      BLOGX_LOGIN_FAIL_IP_MAX: "${BLOGX_LOGIN_FAIL_IP_MAX}"
      BLOGX_EMAIL_SEND_WINDOW_SEC: "${BLOGX_EMAIL_SEND_WINDOW_SEC}"
      BLOGX_EMAIL_SEND_PER_EMAIL_MAX: "${BLOGX_EMAIL_SEND_PER_EMAIL_MAX}"
      BLOGX_EMAIL_SEND_PER_IP_MAX: "${BLOGX_EMAIL_SEND_PER_IP_MAX}"
      BLOGX_ARTICLE_SKIP_EXAMINING: "${BLOGX_ARTICLE_SKIP_EXAMINING}"
      BLOGX_COMMENT_SKIP_EXAMINING: "${BLOGX_COMMENT_SKIP_EXAMINING}"
      BLOGX_AI_ENABLED: "${BLOGX_AI_ENABLED}"
      BLOGX_AI_SECRET: "${BLOGX_AI_SECRET}"
      BLOGX_AI_BASE_URL: "${BLOGX_AI_BASE_URL}"
      BLOGX_AI_CHAT_MODEL: "${BLOGX_AI_CHAT_MODEL}"
      BLOGX_AI_REASON_MODEL: "${BLOGX_AI_REASON_MODEL}"
      BLOGX_AI_TIMEOUT_SEC: "${BLOGX_AI_TIMEOUT_SEC}"
      BLOGX_AI_MAX_INPUT_CHARS: "${BLOGX_AI_MAX_INPUT_CHARS}"
      BLOGX_AI_TEMPERATURE: "${BLOGX_AI_TEMPERATURE}"
      BLOGX_AI_DAILY_QUOTA: "${BLOGX_AI_DAILY_QUOTA}"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      es:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../../apps/api/config:/app/config:ro
      - ../../state/api/uploads:/app/uploads
      - ../../state/api/logs:/app/logs
      - ../../state/api/var:/app/var
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:$${BLOGX_APP_PORT}/api/site/ai_info || exit 1",
        ]
      interval: 100s
      timeout: 5s
      retries: 10
      start_period: 20s
    command:
      [
        "/bin/sh",
        "-c",
        'AUTH_HEADER="Authorization: Basic $(printf ''elastic:%s'' "$$BLOGX_ES_PASSWORD" | base64 | tr -d ''\n'')"; until wget -q --header="$$AUTH_HEADER" -O /dev/null "http://es:9200/_cluster/health?wait_for_status=yellow&timeout=5s"; do echo ''等待 ES 完整启动...''; sleep 3; done; exec /app/server -t run -s init',
      ]
    networks:
      - blogx_network

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: fluent-bit
    restart: unless-stopped
    environment:
      BLOGX_CLICKHOUSE_DB: "${BLOGX_CLICKHOUSE_DB}"
      BLOGX_CLICKHOUSE_USERNAME: "${BLOGX_CLICKHOUSE_USERNAME}"
      BLOGX_CLICKHOUSE_PASSWORD: "${BLOGX_CLICKHOUSE_PASSWORD}"
    depends_on:
      clickhouse:
        condition: service_healthy
      blogx_server:
        condition: service_started
    command: ["/bin/sh", "/fluent-bit/etc/render-config.sh"]
    volumes:
      - ../../docker/fluent-bit/fluent-bit.conf.tmpl:/fluent-bit/etc/fluent-bit.conf.tmpl:ro
      - ../../docker/fluent-bit/render-config.sh:/fluent-bit/etc/render-config.sh:ro
      - ../../docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ../../state/api/logs:/logs:ro
      - ../../state/fluent-bit/state:/fluent-bit/state
    networks:
      - blogx_network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ../../docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../../state/nginx/logs:/var/log/nginx/
      - ../../docker/nginx/dist:/usr/share/nginx/fai_web
      - ../../state/nginx/cert/:/usr/share/nginx/cert
    networks:
      - blogx_network
    ports:
      - "80:80"
      - "443:443"

networks:
  blogx_network:
    driver: bridge
